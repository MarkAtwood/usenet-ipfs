[listen]
addr = "0.0.0.0:119"

[limits]
max_connections = 100
command_timeout_secs = 30

[auth]
required = false

[tls]
cert_path = "/etc/ssl/certs/server.pem"
key_path = "/etc/ssl/private/server.key"
#
# TLS policy (PCI-DSS 4.2.1 / SOC2 CC6.7 regulatory defaults):
#   min_tls_version = "TLS 1.2"  (TLS 1.0 and 1.1 are always rejected)
#   cipher_suites   = approved AESGCM + CHACHA20 ECDHE suites only
# These policies are enforced in code and cannot be relaxed via config.

[admin]
addr = "127.0.0.1:9090"

[log]
level = "info"
format = "json"
